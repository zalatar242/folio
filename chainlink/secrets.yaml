# Secrets for Folio Collar Oracle workflow
# Maps logical names to environment variables
# In simulation: read from .env
# In production: stored in Vault DON via `cre secrets` commands

secretsNames:
  # Chainlink Data Streams HMAC credentials
  # Protected by Confidential HTTP — never exposed to DON nodes
  dataStreamsApiKey:
    - DATA_STREAMS_API_KEY
  dataStreamsHmac:
    - DATA_STREAMS_HMAC_SECRET
  dataStreamsTimestamp:
    - DATA_STREAMS_TIMESTAMP
  # Note: DoltHub options API is public, no secrets needed
