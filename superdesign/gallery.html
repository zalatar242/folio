<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio — Design Gallery</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',system-ui,sans-serif; background:#0A0A0B; color:#E8E8ED; min-height:100vh; padding:24px; }
  h1 { font-size:28px; font-weight:700; margin-bottom:4px; }
  .sub { color:#8E8E93; font-size:14px; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(480px,1fr)); gap:24px; }
  .card { background:#141415; border:1px solid #2A2A2E; border-radius:16px; overflow:hidden; transition:transform 0.2s,box-shadow 0.2s; }
  .card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.4); }
  .card-header { padding:16px 20px; border-bottom:1px solid #2A2A2E; display:flex; justify-content:space-between; align-items:center; }
  .card-header h3 { font-size:15px; font-weight:600; }
  .card-header span { font-size:12px; color:#636366; }
  .preview { height:360px; position:relative; overflow:hidden; }
  .preview iframe { width:200%; height:200%; border:none; transform:scale(0.5); transform-origin:top left; pointer-events:none; }
  .actions { padding:12px 16px; display:flex; gap:8px; }
  .btn { padding:8px 16px; border-radius:8px; font-size:13px; font-family:inherit; font-weight:500; cursor:pointer; border:none; transition:all 0.15s; }
  .btn-open { background:#10B981; color:white; }
  .btn-open:hover { background:#059669; }
  .btn-copy { background:#1C1C1E; border:1px solid #2A2A2E; color:#8E8E93; }
  .btn-copy:hover { background:#2A2A2E; color:#E8E8ED; }
  .also { margin-top:24px; padding:16px 20px; background:#141415; border:1px solid #2A2A2E; border-radius:12px; }
  .also h3 { font-size:14px; font-weight:600; margin-bottom:8px; }
  .also a { color:#10B981; text-decoration:none; font-size:13px; display:block; margin-top:4px; }
  .also a:hover { text-decoration:underline; }
  @media(max-width:540px){ .grid{grid-template-columns:1fr} .preview{height:240px} }
</style>
</head>
<body>
  <h1>folio<span style="color:#10B981">.</span> Design Gallery</h1>
  <div class="sub">3 design variations + mockup</div>

  <div class="grid">
    <div class="card">
      <div class="card-header">
        <h3>Original Mockup</h3>
        <span>mockup.html</span>
      </div>
      <div class="preview">
        <iframe src="../mockup.html" loading="lazy"></iframe>
      </div>
      <div class="actions">
        <button class="btn btn-open" onclick="window.open('../mockup.html','_blank')">View Full</button>
        <button class="btn btn-copy" onclick="navigator.clipboard.writeText('mockup.html')">Copy Path</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Variation 1: Minimal Neobank</h3>
        <span>Tailwind + sidebar nav</span>
      </div>
      <div class="preview">
        <iframe src="./design_iterations/neobank_dark_mode_po_1.html" loading="lazy"></iframe>
      </div>
      <div class="actions">
        <button class="btn btn-open" onclick="window.open('./design_iterations/neobank_dark_mode_po_1.html','_blank')">View Full</button>
        <button class="btn btn-copy" onclick="navigator.clipboard.writeText('superdesign/design_iterations/neobank_dark_mode_po_1.html')">Copy Path</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Variation 2: Card-Forward</h3>
        <span>Bolder type + gradient hero</span>
      </div>
      <div class="preview">
        <iframe src="./design_iterations/neobank_dark_mode_po_2.html" loading="lazy"></iframe>
      </div>
      <div class="actions">
        <button class="btn btn-open" onclick="window.open('./design_iterations/neobank_dark_mode_po_2.html','_blank')">View Full</button>
        <button class="btn btn-copy" onclick="navigator.clipboard.writeText('superdesign/design_iterations/neobank_dark_mode_po_2.html')">Copy Path</button>
      </div>
    </div>
  </div>

  <div class="also">
    <h3>Design References</h3>
    <a href="../UI_DESIGN.md">UI_DESIGN.md — Full design system spec</a>
  </div>
</body>
</html>
